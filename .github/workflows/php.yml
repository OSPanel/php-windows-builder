name: Build PHP
run-name: Build PHP ${{ inputs.php-version }}

on:
  workflow_dispatch:
    inputs:
      php-version:
        description: 'PHP version to build'
        required: true

      arch:
        description: 'Architecture'
        required: true
        type: choice
        options: ['x64', 'x86']
        default: 'x64'

      ts:
        description: 'Thread safety'
        required: true
        type: choice
        options: ['ts', 'nts']
        default: 'ts,nts'

      upload:
        type: choice
        options: ['true', 'false']
        description: Upload artifacts to the downloads server
        required: false
        default: 'true'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          echo "Generating matrix for arch=${{ github.event.inputs.arch }}, ts=${{ github.event.inputs.ts }}"
          echo "matrix={\"include\":[{\"arch\":\"${{ github.event.inputs.arch }}\",\"ts\":\"${{ github.event.inputs.ts }}\"}]}" >> $GITHUB_OUTPUT

  php:
    needs: generate-matrix
    runs-on: windows-2022
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: ./php
        with:
          php-version: ${{ github.event.inputs.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}

  artifacts:
    runs-on: ubuntu-latest
    needs: php
    outputs:
      artifact-id: ${{ steps.artifacts.outputs.artifact-id }}
    steps:
      - name: Upload artifacts
        uses: actions/upload-artifact/merge@v4
        id: artifacts
        with:
          name: artifacts
          delete-merged: true
